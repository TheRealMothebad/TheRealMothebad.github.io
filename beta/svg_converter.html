<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNG to SVG Converter</title>
</head>
<body>
  <input type="file" accept="image/png" id="fileInput" />
  <button onclick="convertToSvg()">Convert to SVG</button>
  <div id="output"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/potrace/1.0.3/potrace.min.js"></script>
  <script>
    function convertToSvg() {
      const fileInput = document.getElementById('fileInput');
      const outputDiv = document.getElementById('output');

      if (!fileInput.files || fileInput.files.length === 0) {
        alert('Please select a PNG file.');
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        const img = new Image();
        img.src = e.target.result;

        img.onload = function () {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const bitmap = new potrace.Bitmap(imageData.data, canvas.width, canvas.height);

          // Convert to SVG with a maximum of 20 colors
          const pathOptions = { color: 20 };
          const svgString = potrace.trace(bitmap, pathOptions).toSVG();
          
          outputDiv.innerHTML = svgString;
        };
      };

      reader.readAsDataURL(fileInput.files[0]);
    }
  </script>
</body>
</html>
