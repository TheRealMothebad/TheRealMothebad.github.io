<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Posterization &amp; Blob Grouping Demo</title>
  <style>
    body { font-family: sans-serif; }
    canvas { border: 1px solid #333; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Posterization &amp; Blob Grouping Demo</h1>
  <p>
    Load an image (or drag a file) and click "Process Image".
  </p>
  <input type="file" id="upload" accept="image/*">
  <button id="processBtn">Process Image</button>
  <br>
  <canvas id="canvas"></canvas>

  <script>
    // --- Helper Functions ---
    // Get the color [r,g,b,a] at (x,y)
    function getColorAt(data, x, y, width) {
      let index = (y * width + x) * 4;
      return [data[index], data[index+1], data[index+2], data[index+3]];
    }

    // Compare two [r,g,b,a] arrays for equality.
    function colorsEqual(c1, c2) {
      return c1[0] === c2[0] &&
             c1[1] === c2[1] &&
             c1[2] === c2[2] &&
             c1[3] === c2[3];
    }

    // --- Step 1: Posterization ---
    // Reduce the number of colors by bucketing each channel into "levels" bins.
    function posterizeImage(imageData, levels) {
      const data = imageData.data;
      const factor = 256 / levels; // e.g. levels = 4 => factor = 64
      for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.floor(data[i]   / factor) * factor;
        data[i+1] = Math.floor(data[i+1] / factor) * factor;
        data[i+2] = Math.floor(data[i+2] / factor) * factor;
        // Leave data[i+3] (alpha) unchanged.
      }
    }

    // --- Step 2: Connected Components Analysis ---
    // Labels each contiguous blob (using 4-neighbor connectivity).
    function labelComponents(imageData, width, height) {
      const data = imageData.data;
      const labels = new Array(width * height).fill(-1);
      let currentLabel = 0;
      const blobSizes = {}; // Keep track of how many pixels each label has.

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = y * width + x;
          if (labels[idx] === -1) { // Unlabeled pixel: start a new blob.
            const baseColor = getColorAt(data, x, y, width);
            const stack = [{ x, y }];
            labels[idx] = currentLabel;
            let size = 0;

            while (stack.length > 0) {
              const { x: cx, y: cy } = stack.pop();
              size++;
              // Check 4-connected neighbors.
              const neighbors = [
                { x: cx + 1, y: cy },
                { x: cx - 1, y: cy },
                { x: cx,     y: cy + 1 },
                { x: cx,     y: cy - 1 }
              ];
              for (const n of neighbors) {
                if (n.x >= 0 && n.x < width && n.y >= 0 && n.y < height) {
                  const nIdx = n.y * width + n.x;
                  if (labels[nIdx] === -1) {
                    const nColor = getColorAt(data, n.x, n.y, width);
                    if (colorsEqual(baseColor, nColor)) {
                      labels[nIdx] = currentLabel;
                      stack.push({ x: n.x, y: n.y });
                    }
                  }
                }
              }
            }
            blobSizes[currentLabel] = size;
            currentLabel++;
          }
        }
      }
      return { labels, blobSizes };
    }

    // --- Step 3: Merge Small Blobs ---
    // For each pixel in a blob smaller than minSize, check its 4-connected neighbors.
    // If any neighbor belongs to a larger blob, change the pixel’s color to that neighbor’s color.
    function mergeSmallBlobs(imageData, labels, blobSizes, width, height, minSize) {
      const data = imageData.data;
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = y * width + x;
          const label = labels[idx];
          if (blobSizes[label] < minSize) {
            // Look at the 4-connected neighbors for a candidate replacement.
            const neighbors = [
              { x: x + 1, y },
              { x: x - 1, y },
              { x,     y: y + 1 },
              { x,     y: y - 1 }
            ];
            let replacementFound = false;
            for (const n of neighbors) {
              if (n.x >= 0 && n.x < width && n.y >= 0 && n.y < height) {
                const nIdx = n.y * width + n.x;
                const nLabel = labels[nIdx];
                if (nLabel !== label && blobSizes[nLabel] >= minSize) {
                  // Replace the pixel color with the neighbor's color.
                  const newColor = getColorAt(data, n.x, n.y, width);
                  const index = idx * 4;
                  data[index]   = newColor[0];
                  data[index+1] = newColor[1];
                  data[index+2] = newColor[2];
                  data[index+3] = newColor[3];
                  replacementFound = true;
                  break;
                }
              }
            }
            // (If no neighbor is found, you might want to leave it as is or perform further processing.)
          }
        }
      }
    }

    // --- Step 4: Morphological Smoothing ---
    // A simple mode (majority) filter is applied over a 3x3 neighborhood.
    function smoothImage(imageData, width, height) {
      const data = imageData.data;
      // Make a copy of the current image data.
      const copy = new Uint8ClampedArray(data);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const colorCounts = {};
          // Look at the 3x3 neighborhood.
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const nx = x + dx, ny = y + dy;
              if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                const nIdx = (ny * width + nx) * 4;
                const r = copy[nIdx],
                      g = copy[nIdx + 1],
                      b = copy[nIdx + 2],
                      a = copy[nIdx + 3];
                const key = r + ',' + g + ',' + b + ',' + a;
                colorCounts[key] = (colorCounts[key] || 0) + 1;
              }
            }
          }
          // Find the most common color.
          let bestColor, maxCount = 0;
          for (const key in colorCounts) {
            if (colorCounts[key] > maxCount) {
              maxCount = colorCounts[key];
              bestColor = key.split(',').map(Number);
            }
          }
          // Update the pixel with the best (most frequent) color.
          const index = (y * width + x) * 4;
          data[index]   = bestColor[0];
          data[index+1] = bestColor[1];
          data[index+2] = bestColor[2];
          data[index+3] = bestColor[3];
        }
      }
    }

    // --- Main Pipeline ---
    function processImage() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      let imageData = ctx.getImageData(0, 0, width, height);

      // Step 1: Posterize the image (using 4 levels per channel).
      posterizeImage(imageData, 4);
      ctx.putImageData(imageData, 0, 0);

      // Step 2: Compute connected components.
      const { labels, blobSizes } = labelComponents(imageData, width, height);

      // Step 3: Merge blobs smaller than a given threshold (e.g., 50 pixels).
      mergeSmallBlobs(imageData, labels, blobSizes, width, height, 50);
      ctx.putImageData(imageData, 0, 0);

      // Step 4: Smooth the image to remove stray or thin bits.
      smoothImage(imageData, width, height);
      ctx.putImageData(imageData, 0, 0);
    }

    // --- Image Loading ---
    // Allow the user to select an image file and display it on the canvas.
    document.getElementById('upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.getElementById('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });

    // Process the image when the button is clicked.
    document.getElementById('processBtn').addEventListener('click', processImage);
  </script>
</body>
</html>
